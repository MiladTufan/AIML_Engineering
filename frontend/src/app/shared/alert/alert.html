<div *ngIf="visible" class="flex border-t-4 rounded-b px-4 py-3 shadow-md w-100 z-20 
                            fixed top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 " 
        [style.top.px]="position?.top"
        [style.left.px]="position?.left" role="alert" [ngClass]="{
        'bg-teal-100 border-teal-500 text-teal-900' : type === 'success',
        'bg-red-100 border-red-400 text-red-70': type === 'error',
        'bg-orange-100 border-orange-500 text-orange-700': type === 'warning',
        'bg-blue-100 border-blue-500 text-blue-700': type === 'info'
     }">
    <div class="flex">
        <div class="py-1"><svg class="fill-current h-6 w-6  mr-4 items-center justify-center"
                xmlns="http://www.w3.org/2000/svg" [ngClass]="{
                            'text-teal-500' : type === 'success',
                            'text-red-800': type === 'error',
                            'text-orange-700': type === 'warning',
                            'text-blue-700': type === 'info'}" viewBox="0 0 20 20">
                <path
                    d="M2.93 17.07A10 10 0 1 1 17.07 2.93 10 10 0 0 1 2.93 17.07zm12.73-1.41A8 8 0 1 0 4.34 4.34a8 8 0 0 0 11.32 11.32zM9 11V9h2v6H9v-4zm0-6h2v2H9V5z" />
            </svg></div>
        <div>
            <p class="font-bold md:text-2xl">{{ alertTitle }}</p>
            <p class="text-sm md:text-lg">{{ message }}</p>
        </div>
    </div>
</div>
