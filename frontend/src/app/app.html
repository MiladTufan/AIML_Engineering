<div #dynamicAppContainer></div>
<app-header></app-header>

<div class="mt-2">
  <button
    class="toolbarBtnStyle fixed bottom-4 right-4 p-2 rounded-md bg-gray-200 z-1000 dark:bg-gray-700 dark:text-white"
    (click)="toggleTheme()"
  >
    {{ themeService.isDarkMode() ? "🌙 Dark" : "☀️ Light" }}
  </button>

  <button
    class="fixed bottom-4 right-24 toolbarBtnStyle rounded-md p-2 bg-gray-200 z-1000 dark:bg-gray-700"
    (click)="goToCredits()"
  >
    Credits
  </button>

  <app-alert></app-alert>
  <router-outlet></router-outlet>
</div>
