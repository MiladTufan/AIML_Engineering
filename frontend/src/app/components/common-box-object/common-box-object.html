<div>
    <div class="textBoxStyle border-4 border-dashed border-blue-500 z-50 
            hover:border-blue-700 hover:shadow-md cursor-move resize both overflow-hidden"
        (mousedown)="onDragStart($event)"
        (dragover)="onDragOver($event)"
        (dragend)="onDragEnd($event)"
        draggable="true"
        #movableDiv
        [ngStyle]="{ transform: 'translate(' + boxBase.BoxDims.left + 'px, ' + boxBase.BoxDims.top + 'px)',
                                        width: boxBase.BoxDims.width + 'px',
                                        height: boxBase.BoxDims.height + 'px'}">
                                        
        <div #childContainer></div>
    </div>

    <div #childContainerAddOn></div>
</div>

<!-- (dragend)="onDragEnd($event)" -->
