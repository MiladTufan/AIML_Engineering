<div
  class="w-[90%] max-w-[1400px] ml-25 h-14 flex items-center justify-start text-center absolute top-[7%] left-1/2 transform -translate-x-1/2 z-200 rounded-lg translucentStyle"
>
  <!-- Insert TextBoxCreate Button -->
  <button
    class="toolbarBtnStyle ml-1 p-2 rounded-t-sm rounded-r-sm rounded-b-md rounded-l-lg dark:hover:bg-[var(--main_dark_hover_color)]"
    #TextButtonContainer
    title="Enter Text"
    (click)="OnTextBtnClicked($event)"
  >
    <!-- <span id="textBtnText" class=>Text</span> -->
    @if (!themeService.isDarkMode()) {
      <img
        [src]="themeService.assetConstants.TEXT_ICON_LIGHT_MODE"
        class="w-[29px] h-[27px]"
      />
    } @else {
      <img
        [src]="themeService.assetConstants.TEXT_ICON_DARK_MODE"
        class="w-[29px] h-[27px]"
      />
    }
  </button>

  <!-- Vertical Line -->
  <div
    class="w-[2px] h-[80%] bg-[var(--btn_border_color)] dark:bg-[var(--main_dark_text_color)] mx-[5px]"
  ></div>

  <!-- Insert Img Button -->
  <button
    class="toolbarBtnStyle p-3 dark:hover:bg-[var(--main_dark_hover_color)]"
    title="Paste Image"
    (click)="OnInsertImageBtnClicked($event)"
  >
    @if (!themeService.isDarkMode()) {
      <img
        class="flex w-[22px] h-[22px]"
        [src]="themeService.assetConstants.INSERT_IMG_ICON_LIGHT_MODE"
      />
    } @else {
      <img
        class="flex w-[22px] h-[22px]"
        [src]="themeService.assetConstants.INSERT_IMG_ICON_DARK_MODE"
      />
    }
  </button>

  <!-- Vertical Line -->
  <div
    class="w-[2px] h-[80%] bg-[var(--btn_border_color)] dark:bg-[var(--main_dark_text_color)] mx-[5px]"
  ></div>

  <!-- Insert Img Button -->
  <button
    class="toolbarBtnStyle p-3 dark:hover:bg-[var(--main_dark_hover_color)]"
    title="Organize PDF Pages"
    (click)="OnOrganizeBtnClicked($event)"
  >
    @if (!themeService.isDarkMode()) {
      <img
        class="flex w-[22px] h-[22px]"
        [src]="themeService.assetConstants.ORGANIZE_ICON"
      />
    } @else {
      <img
        class="flex w-[22px] h-[22px]"
        [src]="themeService.assetConstants.ORGANIZE_ICON_DARK_MODE"
      />
    }
  </button>

  <div
    class="absolute left-1/2 transform -translate-x-1/2 flex rounded-md w-fit h-fit"
  >
    <button
      class="cursor-pointer disabled:opacity-50 disabled:cursor-not-allowed"
      (click)="OnDownClicked($event)"
      [disabled]="isDownDisabled()"
    >
      <svg
        xmlns="http://www.w3.org/2000/svg"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor"
        class="w-4 h-4"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M19 9l-7 7-7-7"
        />
      </svg>
    </button>

    <span class="text-center font-medium">
      <input
        type="text"
        [(ngModel)]="currentPage"
        (ngModelChange)="onPageChange($event)"
        (keydown.enter)="OnEnter(currentPage)"
        class="w-6 outline-none hover:border hover:border-gray-400 hover:rounded text-center"
      />/ {{ this.pdfViewerService.totalPages }}
    </span>

    <button
      class="cursor-pointer disabled:opacity-50 disabled:cursor-not-allowed ml-2"
      (click)="onUpClicked($event)"
      [disabled]="isUpDisabled()"
    >
      <svg
        xmlns="http://www.w3.org/2000/svg"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor"
        class="w-4 h-4"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M5 15l7-7 7 7"
        />
      </svg>
    </button>
  </div>

  <!-- Vertical Line -->
  <div
    class="w-[2px] h-[80%] bg-[var(--btn_border_color)] dark:bg-[var(--main_dark_text_color)] mx-[5px]"
  ></div>

  <!-- Insert Download Button -->
  <button
    class="downloadBtnStyle p-2 ml-auto mr-1 hover:bg-green-500/100"
    title="Download File"
    (click)="OnDownloadBtnClicked($event)"
  >
    @if (!themeService.isDarkMode()) {
      <img
        class="w-[30px] h-[30px] block hover:opacity-0"
        alt="Download PDF Icon"
        [src]="themeService.assetConstants.DOWNLOAD_ICON_LIGHT_MODE"
      />
      <img
        [src]="themeService.assetConstants.DOWNLOAD_ICON_DARK_MODE"
        alt="Download PDF Icon"
        class="w-[30px] h-[30px] absolute opacity-0 hover:opacity-100 hover:scale-120 transform transition-transform duration-500"
      />
    } @else {
      <img
        [src]="themeService.assetConstants.DOWNLOAD_ICON_DARK_MODE"
        alt="Download PDF Icon"
        class="w-[30px] h-[30px] block hover:opacity-0"
      />
      <img
        [src]="themeService.assetConstants.DOWNLOAD_ICON_DARK_MODE"
        alt="Download PDF Icon"
        class="w-[30px] h-[30px] absolute opacity-0 hover:opacity-100 hover:scale-120 transform transition-transform duration-500"
      />
    }
  </button>
</div>
