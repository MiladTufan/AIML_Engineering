<div class="fixed flex items-center justify-left text-center top-[2%] z-10
            translucentStyle  left-1/2 transform -translate-x-1/2 rounded-xl"
	[@slideInOut]="this.textEditService.getCurrentTextStyleEditor().isCollapsed ? 'out' : 'in'" id="colorBar">

	<div class="flex-col mt-2" id="TextStyleContainer">
		<div class="flex">
			<div *ngFor="let color of colors" class="color-container" [ngClass]="{ 'color-white': color === '#FFFFFF' }"
				[style.background-color]="color" [title]="color" (click)="onColorSelect(color)">
			</div>
		</div>

		<div class="relative flex text-center mt-2 mb-2">
			<div class="relative inline-block text-center mt-2 mb-2 " id="fontSelect">
				<div>
					<button (click)="toggleFontDropDown()" type="button" [style.font-family]="currentFont"
							class="dropdownBtnStyleLowOp rounded-md ml-1 h-10 px-2 flex items-center">{{currentFontName}}
						<svg class="-mr-1 ml-2 h-4 w-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
							stroke="currentColor" stroke-width="2">
							<path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
						</svg>
					</button>
				</div>

				<app-drop-down-menu-component (selectedItem)="SelectedFont($event)" [width]="128" [height]="24"
											  [isDropDownOpen]="isFontDropDownOpen"
											  [dropDownItems]="availableFonts"></app-drop-down-menu-component>

			</div>

			<div class="flex px-2 text-center rounded-md text-sm font-medium
						ml-1 mt-2 mb-2 items-center justify-center cursor-pointer">
						
				<div class="relative inline-block items-center justify-center border-1 border-gray-300/100 rounded-md hover:bg-gray-50/100">
					<div class="flex items-center justify-center" id="fontSizeSelect">
						<input type="text" class="ml-1 w-5 h-6 resize-none cursor-text outline-none  overflow-hidden leading-normal" 
								[(ngModel)]="currentFontSize" (ngModelChange)="SelectedFontSize($event)">
						<svg (click)="toggleSizeDropDown()" class="mr-1 ml-2 h-4 w-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
							stroke="currentColor" stroke-width="2">
							<path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
						</svg>
					</div>
				

					<app-drop-down-menu-component (selectedItem)="SelectedFontSize($event)" [width]="40" [height]="24"
												  [isDropDownOpen]="isFontSizeDropDownOpen"
												  [dropDownItems]="fontSizeSteps"></app-drop-down-menu-component>
				</div>
			</div>
		</div>


	</div>
</div>
