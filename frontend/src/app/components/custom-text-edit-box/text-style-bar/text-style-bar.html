<div class="fixed flex items-center justify-left text-center top-[2%] z-10
            translucentStyle  left-1/2 transform -translate-x-1/2 rounded-xl"
	[@slideInOut]="this.textEditService.getCurrentTextStyleEditor().isCollapsed ? 'out' : 'in'" id="colorBar">

	<div class="flex-col mt-2" id="TextStyleContainer">
		<div class="flex">
			<div *ngFor="let color of colors" class="color-container" [ngClass]="{ 'color-white': color === '#FFFFFF' }"
				[style.background-color]="color" [title]="color" (click)="onColorSelect(color)">
			</div>
		</div>

		<div class="relative inline-block text-center mt-2 mb-2">
			<div>
				<button (click)="toggleDowpDown()" type="button" class="dropdownBtnStyle h-10 px-2">Inter
					<svg class="-mr-1 ml-2 h-4 w-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
						stroke="currentColor" stroke-width="2">
						<path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
					</svg>
				</button>
			</div>

			@if (isFontDropDownOpen) {
			<div class="absolute right-0 z-10">
				<div class="py-1 translucentStyle bg-white backdrop-blur-lg rounded-xl">

					@for (font of fontOptions ; track $index) {
						@if ($index == 0) {
							<button class="dropdownBtnStyle block text-sm text-black w-30 h-12
											hover:bg-gray-200 text-center rounded-t-xl mt-[-5px]">{{font.name}}
							</button>
						}
						@else if (fontOptions.length - 1 == $index) {
							<button class="dropdownBtnStyle block  text-sm text-black w-30 h-12
											hover:bg-gray-200 text-center rounded-b-xl mb-[-5px]">{{font.name}}
							</button>
						}
						@else {
							<button class="dropdownBtnStyle block  text-sm text-black w-30 h-12
											hover:bg-gray-200 text-center">{{font.name}}
							</button>
						}

					}
				</div>
			</div>
			}

		</div>


	</div>
